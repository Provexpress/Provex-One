<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provex One - Licencias Cloud</title>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      '#F5F7FD',
            card:    '#FFFFFF',
            primary: '#1A2B6B',
            muted:   '#677592',
            sep:     '#D7E0F0',
            action:  '#1565C0',
            success: '#16A34A',
            danger:  '#C62828',
            warn:    '#D97706',
            lol:     '#6A3FA0',
            intcomex:'#2ABFDF',
            ingram:  '#1565C0',
          },
          fontFamily: {
            sans: ['Futura PT', 'Futura Std', 'Futura', 'Twentieth Century', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
          },
          boxShadow: {
            card: '0 18px 42px rgba(26, 43, 107, 0.08)',
            btn:  '0 14px 26px rgba(26, 43, 107, 0.16)',
          },
          borderRadius: {
            card:  '16px',
            btn:   '12px',
            input: '10px',
            chip:  '20px',
          },
        }
      }
    }
  </script>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/provex_icon_16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/provex_icon_32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/provex_icon_192.png">
  <meta name="theme-color" content="#1A2B6B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Provex One">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/provex_icon_180.png">
  <link rel="stylesheet" href="css/styles.css?v=20260326d">
</head>
<body class="app-body bg-bg text-primary min-h-screen font-sans antialiased" style="letter-spacing:-0.022em">

  <!-- NAV -->
  <nav class="app-nav sticky top-0 z-50 px-4 sm:px-6 py-4 sm:py-5
              bg-white/70 backdrop-blur-sm border-b border-sep/50">
    <div class="max-w-[960px] mx-auto flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 min-w-0">
        <img src="icons/logo.webp" alt="Provexpress" class="brand-logo" width="220" height="58">
      </div>
      <div class="text-right min-w-0">
        <div class="brand-title">Provex One</div>
      </div>
    </div>
  </nav>

  <main class="max-w-[960px] mx-auto px-4 pt-5 pb-12">
    <section id="installBanner" class="install-banner panel-shell bg-card rounded-card shadow-card p-4 mb-3" hidden aria-label="Instalacion de la app">
      <div class="install-banner-copy">
        <p class="install-banner-eyebrow">App</p>
        <p id="installBannerText" class="install-banner-text"></p>
      </div>
      <div class="install-banner-actions">
        <button type="button" id="installBannerButton" class="install-banner-button" hidden>
          Instalar app
        </button>
        <button type="button" id="installBannerDismiss" class="install-banner-dismiss" aria-label="Cerrar ayuda de instalacion">
          Ahora no
        </button>
      </div>
    </section>

    <!-- SEARCH CARD -->
    <section class="panel-shell bg-card rounded-card shadow-card p-5 mb-3" aria-label="Busqueda de licencias cloud">
      <p class="text-[11px] font-semibold text-muted uppercase tracking-[0.06em] mb-3">
        Cloud
      </p>
      <p class="text-[13px] text-muted mb-4">Busqueda rapida y comparacion de licencias Microsoft por mayorista.</p>
      <div class="flex flex-wrap gap-2 items-end">
        <div id="searchComposer" class="flex flex-col gap-1 flex-[2] min-w-[200px] relative">
          <label for="searchInput" class="text-[11px] font-medium text-muted">Nombre del producto</label>
          <input type="text" id="searchInput" class="search-input"
                 placeholder="Ej: Microsoft 365 Business Standard"
                 autocomplete="off">
          <div id="searchSuggestions" class="search-suggestions" hidden></div>
        </div>
        <div class="flex flex-col gap-1 flex-1 min-w-[130px]">
          <label for="typeFilter" class="text-[11px] font-medium text-muted">Tipo</label>
          <select id="typeFilter" class="search-input">
            <option value="">Todos los tipos</option>
            <option value="NCE">NCE</option>
            <option value="SUSCRIPCION">Suscripcion</option>
            <option value="PERPETUO">Perpetuo</option>
          </select>
        </div>
        <div class="flex flex-col gap-1 flex-1 min-w-[130px]">
          <label for="segFilter" class="text-[11px] font-medium text-muted">Segmento</label>
          <select id="segFilter" class="search-input">
            <option value="">Todos</option>
            <option value="Commercial">Commercial</option>
            <option value="Education">Education</option>
          </select>
        </div>
        <div class="flex flex-col gap-1 flex-1 min-w-[130px]">
          <label for="termFilter" class="text-[11px] font-medium text-muted">Periodo</label>
          <select id="termFilter" class="search-input">
            <option value="">Todos</option>
            <option value="mensual_mensual">Mensual / Mensual</option>
            <option value="anual_anual">Anual / Anual</option>
            <option value="anual_mensual">Anual / Mensual</option>
            <option value="trianual_anual">Trianual / Anual</option>
            <option value="trianual_trianual">Trianual / Trianual</option>
            <option value="trianual_mensual">Trianual / Mensual</option>
            <option value="onetime_onetime">One Time / OneTime</option>
          </select>
        </div>
        <button type="button" id="searchButton"
                class="self-end bg-action text-white font-semibold text-sm rounded-btn
                       px-5 py-[10px] min-h-[40px] whitespace-nowrap shadow-btn
                       hover:opacity-90 hover:-translate-y-px active:translate-y-0
                       transition-all duration-150">
          Buscar
        </button>
      </div>

      <div id="selectedProductsSection" class="selected-products mt-3" hidden>
        <div class="selected-products-head">
          <span class="selected-products-label">Productos seleccionados para comparar</span>
          <button type="button" id="clearSelectedProducts" class="selected-products-clear">
            Limpiar
          </button>
        </div>
        <div id="selectedProductsList" class="selected-products-list"></div>
      </div>

      <!-- Chips -->
      <div class="flex flex-wrap gap-1.5 mt-3 pt-3 border-t border-sep" aria-label="Mayoristas activos">
        <button type="button" class="filter-chip active" data-dist="LOL">
          <span class="chip-dot chip-dot-lol"></span>LOL
        </button>
        <button type="button" class="filter-chip active" data-dist="INTCOMEX">
          <span class="chip-dot chip-dot-intcomex"></span>INTCOMEX
        </button>
        <button type="button" class="filter-chip active" data-dist="INGRAM">
          <span class="chip-dot chip-dot-ingram"></span>INGRAM
        </button>
      </div>
    </section>

    <!-- QUOTE BAR -->
    <section class="panel-shell bg-card rounded-card shadow-card px-5 py-3.5 mb-5
                    flex flex-wrap items-center gap-4" aria-label="Configuracion de cotizacion cloud">
      <p class="text-[11px] font-semibold text-muted uppercase tracking-[0.06em] whitespace-nowrap">
        Cotización
      </p>
      <div class="hidden sm:block w-px h-5 bg-sep flex-shrink-0"></div>
      <div class="flex items-center gap-1.5">
        <label for="profitPct" class="text-[11px] font-medium text-muted whitespace-nowrap">Rentabilidad</label>
        <input type="number" id="profitPct" value="1" min="0" max="999" class="profit-input">
        <span class="text-[12px] font-medium text-muted">%</span>
      </div>
      <div class="hidden sm:block w-px h-5 bg-sep flex-shrink-0"></div>
      <div class="flex items-center gap-1.5">
        <label for="qtyInput" class="text-[11px] font-medium text-muted whitespace-nowrap">Cantidad</label>
        <input type="number" id="qtyInput" value="1" min="1" class="qty-input">
        <span class="text-[12px] font-medium text-muted">uds</span>
      </div>
      <div class="hidden sm:block w-px h-5 bg-sep flex-shrink-0"></div>
      <div class="flex items-center gap-1.5">
        <span class="text-[11px] font-medium text-muted">Moneda</span>
        <span class="info-badge">USD</span>
      </div>
      <div class="hidden sm:block w-px h-5 bg-sep flex-shrink-0"></div>
      <div class="flex items-center gap-1.5">
        <label for="trmInput" class="text-[11px] font-medium text-muted">TRM</label>
        <input type="text" id="trmInput" value="4200" class="profit-input wide-input readonly-input" readonly aria-readonly="true">
        <span id="trmStatus" class="status-text is-muted"></span>
      </div>
    </section>

    <!-- MOBILE TABS -->
    <div id="distTabs" class="dist-tabs" aria-label="Mayoristas en movil">
      <button type="button" class="dist-tab active" data-dist="LOL">
        <span class="dist-tab-dot dist-tab-dot-lol"></span>LOL
      </button>
      <button type="button" class="dist-tab" data-dist="INTCOMEX">
        <span class="dist-tab-dot dist-tab-dot-intcomex"></span>INTCOMEX
      </button>
      <button type="button" class="dist-tab" data-dist="INGRAM">
        <span class="dist-tab-dot dist-tab-dot-ingram"></span>INGRAM
      </button>
    </div>

    <!-- RESULTS -->
    <section id="resultsArea" aria-live="polite">
      <div class="empty-state empty-state-panel">
        <div class="icon">&#128269;</div>
        <h3>Busca o selecciona productos</h3>
        <p>Agrega varios productos para compararlos en la misma busqueda</p>
      </div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW registrado:', reg.scope))
          .catch(err => console.warn('SW error:', err));
      });
    }
  </script>
</body>
</html>
